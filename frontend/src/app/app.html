<mat-toolbar color="primary">
  <span class="app-title">FormulAI</span>
  <app-project-selector />
  <span class="toolbar-spacer"></span>
  <button mat-icon-button
          class="dark-toggle-btn"
          (click)="toggleDarkMode()"
          [matTooltip]="isDark() ? '切换到浅色模式' : '切换到深色模式'"
          [attr.aria-label]="isDark() ? '切换到浅色模式' : '切换到深色模式'">
    <mat-icon>{{ isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
  <button mat-icon-button class="sidebar-toggle-btn"
          (click)="toggleSidebar()"
          [matTooltip]="sidebarCollapsed() ? '展开 AI 助手' : '收起 AI 助手'"
          [attr.aria-label]="sidebarCollapsed() ? '展开 AI 助手' : '收起 AI 助手'">
    <mat-icon>{{ sidebarCollapsed() ? 'smart_toy' : 'close' }}</mat-icon>
  </button>
</mat-toolbar>

<div class="app-container">
  <div class="app-main" [class.sidebar-collapsed]="sidebarCollapsed()">
    @if (!projectState.hasProject()) {
      <mat-card class="no-project-card">
        <mat-card-content class="no-project-content">
          <mat-icon class="no-project-icon">workspaces</mat-icon>
          <h2>选择或创建工作空间</h2>
          <p>请先选择或创建一个工作空间以开始使用。</p>
          <div class="no-project-actions">
            <button mat-stroked-button (click)="projectState.loadProjects()">
              <mat-icon>refresh</mat-icon>
              刷新列表
            </button>
            <button mat-flat-button (click)="openCreateProjectDialog()">
              <mat-icon>add</mat-icon>
              创建工作空间
            </button>
          </div>
        </mat-card-content>
      </mat-card>
    } @else {
    <mat-card>
      <mat-card-content>
        <mat-tab-group>
          <mat-tab label="测试大纲">
            <app-test-outline />
          </mat-tab>
          <mat-tab label="配方管理">
            <app-formula-list />
          </mat-tab>
          <mat-tab label="预制物料">
            <app-prebuilt-material />
          </mat-tab>
          <mat-tab label="配方分析">
            <app-formula-analysis />
          </mat-tab>
        </mat-tab-group>
      </mat-card-content>
    </mat-card>
    }
  </div>

  <div class="app-sidebar" [class.collapsed]="sidebarCollapsed()">
    <app-chat-panel />
  </div>
</div>

<router-outlet />
