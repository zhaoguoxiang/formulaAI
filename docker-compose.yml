services:
  postgres:
    image: postgres:16-alpine
    container_name: formula-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-formula}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-formula_ai}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-formula} -d ${DB_NAME:-formula_ai}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - formula-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: formula-backend
    dns:
      - 127.0.0.11
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-formula}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-formula_ai}
      SERVER_PORT: "8080"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - formula-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: formula-frontend
    dns:
      - 127.0.0.11
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - formula-network
    restart: unless-stopped

  copilotkit-runtime:
    build:
      context: ./copilotkit-runtime
      dockerfile: Dockerfile
    container_name: formula-copilotkit
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BACKEND_URL: http://backend:8080
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - formula-network
    restart: unless-stopped

volumes:
  pgdata:
    driver: local

networks:
  formula-network:
    driver: bridge
